<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Knowledge Base</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    .login, .app { display:none; }
    .center { display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:white; padding:20px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.1); }
    input, button, select { padding:8px; margin:5px 0; width:100%; }
    .nav { background:#222; color:#fff; padding:10px; }
    .container { padding:15px; }
    .item { background:#fff; margin:10px 0; padding:10px; border-radius:8px; }
  </style>
</head>
<body>

<div class="login center">
  <div class="box">
    <h3>输入密码</h3>
    <input type="password" id="pwd">
    <button onclick="login()">进入</button>
  </div>
</div>

<div class="app">
  <div class="nav">个人网站</div>
  <div class="container">

    <input type="text" id="search" placeholder="搜索..." oninput="render()">

    <select id="categoryFilter" onchange="render()">
      <option value="">全部分类</option>
    </select>

    <h3>新增内容</h3>
    <input id="title" placeholder="标题">
    <input id="content" placeholder="内容">
    <input id="category" placeholder="分类（如：技术/生活）">
    <button onclick="addItem()">添加</button>

    <div id="list"></div>
  </div>
</div>

<script>
const PASSWORD = "123456"; // 改成你自己的

let data = JSON.parse(localStorage.getItem("data") || "[]");

function login(){
  const val = document.getElementById('pwd').value;
  if(val === PASSWORD){
    document.querySelector('.login').style.display='none';
    document.querySelector('.app').style.display='block';
    init();
  } else {
    alert('密码错误');
  }
}

function init(){
  document.querySelector('.login').style.display='flex';
  updateCategories();
  render();
}

function updateCategories(){
  const select = document.getElementById('categoryFilter');
  const cats = [...new Set(data.map(i=>i.category))];
  select.innerHTML = '<option value="">全部分类</option>' + cats.map(c=>`<option>${c}</option>`).join('');
}

function addItem(){
  const item = {
    title: document.getElementById('title').value,
    content: document.getElementById('content').value,
    category: document.getElementById('category').value
  };
  data.push(item);
  localStorage.setItem("data", JSON.stringify(data));
  updateCategories();
  render();
}

function render(){
  const kw = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;

  const list = data.filter(i=>{
    return (!kw || i.title.toLowerCase().includes(kw) || i.content.toLowerCase().includes(kw))
      && (!cat || i.category === cat);
  });

  document.getElementById('list').innerHTML = list.map(i=>
    `<div class="item"><b>${i.title}</b><br>${i.content}<br><small>${i.category}</small></div>`
  ).join('');
}

// 初始
init();
document.querySelector('.login').style.display='flex';
</script>

</body>
</html>
