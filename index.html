<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outai 文件管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-zinc-950">
        <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md border border-zinc-700">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center text-3xl mb-4">📁</div>
                <h1 class="text-3xl font-bold">Outai 文件库</h1>
                <p class="text-zinc-400 mt-2">上传 & 浏览文件</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-zinc-400 mb-1.5">账号</label>
                    <input id="username" type="text" value="outai" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-1.5">密码</label>
                    <input id="password" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500 transition-colors">
                </div>
                <button onclick="login()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-lg transition-all active:scale-95">登录</button>
                <p id="login-error" class="text-red-400 text-center hidden">账号或密码错误</p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden min-h-screen">
        <nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="text-2xl">📁</div>
                    <div>
                        <div class="font-semibold">Outai 文件管理</div>
                        <div class="text-xs text-zinc-500">浏览器本地存储</div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="logout()" class="text-sm px-4 py-2 text-zinc-400 hover:text-white transition-colors">退出登录</button>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-6 py-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold">我的文件</h1>
                <label class="cursor-pointer bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                    <i class="fa-solid fa-upload"></i> 上传文件
                    <input type="file" id="file-upload" multiple class="hidden" onchange="uploadFiles(event)">
                </label>
            </div>

            <div id="files-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        const correctUsername = 'outai';
        const correctPassword = 'zxcvb@asdf@123A';
        let files = JSON.parse(localStorage.getItem('outai_files')) || [];

        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (username === correctUsername && password === correctPassword) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                renderFiles();
            } else {
                const error = document.getElementById('login-error');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        }

        function logout() {
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('password').value = '';
        }

        function renderFiles() {
            const container = document.getElementById('files-list');
            container.innerHTML = '';

            if (files.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-500">还没有上传文件，点击上方按钮上传</div>`;
                return;
            }

            files.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = 'bg-zinc-900 border border-zinc-800 rounded-3xl p-6';
                card.innerHTML = `
                    <div class="flex justify-between">
                        <div class="flex-1">
                            <div class="font-medium">${file.name}</div>
                            <div class="text-xs text-zinc-500 mt-1">${(file.size / 1024).toFixed(1)} KB</div>
                        </div>
                        <button onclick="deleteFile(${index})" class="text-red-400 hover:text-red-500">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    ${file.type.startsWith('image/') ? `<img src="${file.data}" class="mt-4 w-full rounded-2xl">` : ''}
                    <a href="${file.data}" download="${file.name}" class="mt-4 block text-center bg-zinc-800 hover:bg-zinc-700 py-2 rounded-2xl text-sm">下载</a>
                `;
                container.appendChild(card);
            });
        }

        function uploadFiles(e) {
            const uploadedFiles = e.target.files;
            Array.from(uploadedFiles).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    files.unshift({
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: ev.target.result,
                        date: new Date().toISOString()
                    });
                    localStorage.setItem('outai_files', JSON.stringify(files));
                    renderFiles();
                };
                reader.readAsDataURL(file);
            });
        }

        function deleteFile(index) {
            if (confirm('确定删除这个文件吗？')) {
                files.splice(index, 1);
                localStorage.setItem('outai_files', JSON.stringify(files));
                renderFiles();
            }
        }

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
