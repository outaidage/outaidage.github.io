<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>outaidage.xyz</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#09090b;
  color:#fafafa;
  overflow:hidden;
}
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(99,102,241,.18), transparent 35%),
    radial-gradient(circle at bottom right, rgba(168,85,247,.14), transparent 30%);
}
.glass{
  background:rgba(24,24,27,.68);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.08);
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->
<div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-xl">

  <div class="glass rounded-[32px] p-10 w-[92%] max-w-md shadow-2xl">

    <div class="mb-10">
      <div class="text-4xl font-black mb-2">
        outaidage.xyz
      </div>

      <div class="text-zinc-400">
        Secure Upload Workspace
      </div>
    </div>

    <input
      id="username"
      placeholder="账号"
      class="w-full mb-4 px-5 py-4 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none"
    >

    <input
      id="password"
      type="password"
      placeholder="密码"
      class="w-full mb-6 px-5 py-4 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none"
    >

    <button
      onclick="login()"
      class="w-full py-4 rounded-2xl bg-white text-black font-bold transition hover:scale-[1.01]"
    >
      进入系统
    </button>

    <div id="loginError" class="hidden text-red-400 text-sm mt-4">
      账号或密码错误
    </div>

  </div>

</div>

<!-- APP -->
<div class="relative z-10 max-w-6xl mx-auto px-6 py-10">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-16">

    <div>
      <div class="text-6xl font-black tracking-tight">
        File Cloud
      </div>

      <div class="text-zinc-500 mt-3">
        Modern GitHub Upload Workspace
      </div>
    </div>

    <button
      onclick="logout()"
      class="glass px-5 py-3 rounded-2xl"
    >
      退出登录
    </button>

  </div>

  <!-- MAIN -->
  <div class="glass rounded-[36px] p-10 shadow-2xl">

    <!-- CONFIG -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">

      <input
        id="repo"
        value="outaidage/outaidage.github.io"
        class="px-5 py-4 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none"
      >

      <input
        id="token"
        type="password"
        placeholder="输入 GitHub Personal Access Token"
        class="px-5 py-4 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none"
      >

    </div>

    <!-- DROPZONE -->
    <div
      id="dropzone"
      class="border-2 border-dashed border-zinc-700 rounded-[36px] p-24 text-center transition-all cursor-pointer hover:border-white"
    >

      <div class="text-4xl font-black mb-4">
        拖拽文件到这里
      </div>

      <div class="text-zinc-500 text-lg">
        文件将自动提交到 uploads 文件夹
      </div>

      <div class="mt-6 text-sm text-zinc-600">
        Click or Drag File
      </div>

      <input id="fileInput" type="file" class="hidden">

    </div>

    <!-- STATUS -->
    <div
      id="status"
      class="mt-8 text-zinc-400 text-sm"
    ></div>

  </div>

</div>

<script>

/* =========================
   LOGIN
========================= */

const AUTH_USER = "admin";
const AUTH_PASS = "zxcvb@asdf@123A";

if(localStorage.getItem("outai_auth")==="ok"){
  document.getElementById("loginOverlay").style.display="none";
}

function login(){

  const u=document.getElementById("username").value.trim();
  const p=document.getElementById("password").value;

  if(u===AUTH_USER && p===AUTH_PASS){

    localStorage.setItem("outai_auth","ok");

    document.getElementById("loginOverlay").style.display="none";

  }else{

    document.getElementById("loginError").classList.remove("hidden");

  }

}

function logout(){

  localStorage.removeItem("outai_auth");

  location.reload();

}

/* =========================
   DROPZONE
========================= */

const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("fileInput");

dropzone.addEventListener("click",()=>{

  fileInput.click();

});

dropzone.addEventListener("dragover",(e)=>{

  e.preventDefault();

  dropzone.classList.add("border-white");

});

dropzone.addEventListener("dragleave",()=>{

  dropzone.classList.remove("border-white");

});

dropzone.addEventListener("drop",(e)=>{

  e.preventDefault();

  dropzone.classList.remove("border-white");

  const file=e.dataTransfer.files[0];

  if(file){
    uploadFile(file);
  }

});

fileInput.addEventListener("change",(e)=>{

  const file=e.target.files[0];

  if(file){
    uploadFile(file);
  }

});

/* =========================
   GITHUB UPLOAD
========================= */

async function uploadFile(file){

  const token=document.getElementById("token").value.trim();
  const repo=document.getElementById("repo").value.trim();

  if(!token){

    alert("请输入 GitHub Token");

    return;

  }

  const status=document.getElementById("status");

  status.innerHTML="读取文件中...";

  const reader=new FileReader();

  reader.onload=async()=>{

    try{

      const base64=reader.result.split(",")[1];

      const path=`uploads/${Date.now()}-${file.name}`;

      status.innerHTML=`上传中：${file.name}`;

      const response=await fetch(
        `https://api.github.com/repos/${repo}/contents/${path}`,
        {
          method:"PUT",
          headers:{
            "Authorization":"Bearer "+token,
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            message:"feat: modernize UI and integrated file upload system",
            content:base64
          })
        }
      );

      if(response.ok){

        status.innerHTML=`
          <div class="text-green-400">
            上传成功：${path}
          </div>
        `;

      }else{

        const err=await response.text();

        status.innerHTML=`
          <div class="text-red-400">
            上传失败
          </div>
        `;

        console.error(err);

      }

    }catch(e){

      console.error(e);

      status.innerHTML=`
        <div class="text-red-400">
          上传异常
        </div>
      `;

    }

  };

  reader.readAsDataURL(file);

}

</script>

</body>
</html>
