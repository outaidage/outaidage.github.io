<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{padding:15px;background:#222;color:#fff;text-align:center}
.container{padding:15px}
.section{background:#fff;margin-bottom:15px;padding:15px;border-radius:8px}
.section h2{margin-top:0}
input,button{padding:8px;margin:5px 0;width:100%}
.item{border-top:1px solid #eee;padding:8px 0}
img{max-width:100%;height:auto}
a{color:blue}
</style>
</head>
<body>
<header>
<h1>Personal Dashboard</h1>
</header>
<div class="container" id="app"></div>
<script>
const sections=["学习","工作","上岸","书签","信仰","梦想"];
function loadData(key){return JSON.parse(localStorage.getItem(key)||"[]")}
function saveData(key,data){localStorage.setItem(key,JSON.stringify(data))}
function createSection(name){
const key="sec_"+name;
const section=document.createElement("div");
section.className="section";
section.innerHTML=`<h2>${name}</h2>
<input placeholder="文字内容" id="${key}_text">
<input placeholder="链接 (https://)" id="${key}_link">
<input type="file" id="${key}_file" accept="image/*">
<button onclick="addItem('${key}')">添加</button>
<div id="${key}_list"></div>`;
document.getElementById("app").appendChild(section);
renderList(key);
}
function addItem(key){
const text=document.getElementById(key+"_text").value;
const link=document.getElementById(key+"_link").value;
const fileInput=document.getElementById(key+"_file");
const file=fileInput.files[0];
let data=loadData(key);
if(file){
const reader=new FileReader();
reader.onload=function(e){
data.push({text,link,image:e.target.result});
saveData(key,data);
renderList(key);
};
reader.readAsDataURL(file);
}else{
data.push({text,link,image:null});
saveData(key,data);
renderList(key);
}
document.getElementById(key+"_text").value="";
document.getElementById(key+"_link").value="";
fileInput.value="";
}
function renderList(key){
const list=document.getElementById(key+"_list");
list.innerHTML="";
let data=loadData(key);
data.forEach(item=>{
const div=document.createElement("div");
div.className="item";
div.innerHTML=`
<div>${item.text||""}</div>
<div>${item.link?`<a href=" " target="_blank">${item.link}</a >`:""}</div>
${item.image?`< img src="${item.image}">`:""}
`;
list.appendChild(div);
});
}
sections.forEach(createSection);
</script>
</body>
</html>
